kind = "web"
previewPath = "/"
title = "LeadHunter AI"
version = "1.0.0"
id = "artifacts/leadhunter-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23942
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/leadhunter-ai run dev"

[services.env]
PORT = "23942"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/leadhunter-ai", "run", "build"]
publicDir = "artifacts/leadhunter-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
